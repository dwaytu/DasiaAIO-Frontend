<svg viewBox="0 0 1000 1000" width="1000" height="1000" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1000" height="1000" fill="url(#bgGradient)"/>
  
  <!-- Decorative circles -->
  <circle cx="200" cy="150" r="40" fill="rgba(255,255,255,0.1)"/>
  <circle cx="800" cy="250" r="60" fill="rgba(255,255,255,0.08)"/>
  <circle cx="150" cy="700" r="50" fill="rgba(255,255,255,0.1)"/>
  <circle cx="850" cy="800" r="45" fill="rgba(255,255,255,0.08)"/>
  
  <!-- Shield icon -->
  <g transform="translate(150, 200)">
    <path d="M 30 5 L 30 35 Q 30 50 15 55 Q 0 50 0 35 L 0 5 Z" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
    <circle cx="15" cy="28" r="4" fill="rgba(255,255,255,0.3)"/>
  </g>
  
  <!-- Lock icon -->
  <g transform="translate(700, 150)">
    <rect x="5" y="15" width="20" height="25" rx="2" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
    <circle cx="15" cy="27" r="3" fill="rgba(255,255,255,0.3)"/>
    <path d="M 10 15 Q 10 8 15 8 Q 20 8 20 15" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  </g>
  
  <!-- Key icon -->
  <g transform="translate(800, 400)">
    <circle cx="8" cy="12" r="6" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
    <line x1="12" y1="12" x2="24" y2="12" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
    <rect x="22" y="8" width="3" height="8" fill="rgba(255,255,255,0.3)"/>
  </g>
  
  <!-- Security badge -->
  <g transform="translate(100, 500)">
    <circle cx="15" cy="15" r="12" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
    <path d="M 15 8 L 17 12 L 21 12 L 18 15 L 19 19 L 15 16 L 11 19 L 12 15 L 9 12 L 13 12 Z" fill="rgba(255,255,255,0.3)"/>
  </g>
  
  <!-- Document/page icon -->
  <g transform="translate(250, 400)">
    <rect x="0" y="2" width="12" height="18" rx="1" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
    <line x1="3" y1="6" x2="9" y2="6" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <line x1="3" y1="9" x2="9" y2="9" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <line x1="3" y1="12" x2="6" y2="12" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  </g>
  
  <!-- Central security guard illustration -->
  <g transform="translate(400, 300)">
    <!-- Head -->
    <circle cx="0" cy="-40" r="20" fill="rgba(0,0,0,0.2)"/>
    
    <!-- Cap -->
    <ellipse cx="0" cy="-55" rx="22" ry="8" fill="rgba(0,0,0,0.3)"/>
    <text x="0" y="-50" text-anchor="middle" font-size="16" fill="rgba(255,255,255,0.3)" font-weight="bold">SECURITY</text>
    
    <!-- Body -->
    <rect x="-18" y="-18" width="36" height="50" rx="3" fill="rgba(0,0,0,0.2)"/>
    
    <!-- Badge on chest -->
    <circle cx="0" cy="5" r="8" fill="rgba(255,255,255,0.4)"/>
    <circle cx="0" cy="5" r="5" fill="rgba(168, 85, 247, 0.6)"/>
    
    <!-- Hand/gesture -->
    <g transform="translate(25, 5)">
      <circle cx="0" cy="0" r="4" fill="rgba(0,0,0,0.2)"/>
      <path d="M -3 -8 L 0 -10 L 3 -8" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" fill="none"/>
      <circle cx="0" cy="-2" r="3" fill="rgba(255,255,255,0.1)"/>
    </g>
    
    <!-- Legs -->
    <line x1="-10" y1="32" x2="-10" y2="50" stroke="rgba(0,0,0,0.2)" stroke-width="4"/>
    <line x1="10" y1="32" x2="10" y2="50" stroke="rgba(0,0,0,0.2)" stroke-width="4"/>
  </g>
  
  <!-- 24/7 availability indicator -->
  <g transform="translate(550, 550)">
    <circle cx="0" cy="0" r="18" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
    <text x="0" y="5" text-anchor="middle" font-size="14" fill="rgba(255,255,255,0.3)" font-weight="bold">24</text>
  </g>
  
  <!-- Checkmark/verification icon -->
  <g transform="translate(650, 200)">
    <circle cx="0" cy="0" r="10" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
    <path d="M -5 0 L -2 3 L 4 -4" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Wavy lines for security/network -->
  <g transform="translate(200, 800)" opacity="0.2">
    <path d="M 0 0 Q 10 -5 20 0 T 40 0" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
    <path d="M 0 10 Q 10 5 20 10 T 40 10" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
  </g>
</svg>