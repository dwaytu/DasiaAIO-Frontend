<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0EA5E9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0369A1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D9FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0EA5E9;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle for icon use -->
  <circle cx="256" cy="256" r="256" fill="#001F3F" opacity="0.95"/>
  
  <!-- Outer Shield -->
  <path d="M 256 80 L 400 160 L 400 320 Q 400 440 256 500 Q 112 440 112 320 L 112 160 Z" 
        fill="url(#shieldGradient)" stroke="#000B1F" stroke-width="4"/>
  
  <!-- Inner Shield Border -->
  <path d="M 256 100 L 380 170 L 380 320 Q 380 420 256 470 Q 132 420 132 320 L 132 170 Z" 
        fill="none" stroke="url(#accentGradient)" stroke-width="3" opacity="0.7"/>
  
  <!-- Outer Monitoring Rings -->
  <circle cx="256" cy="280" r="20" fill="none" stroke="#00D9FF" stroke-width="3" opacity="0.7" filter="url(#glow)"/>
  <circle cx="256" cy="280" r="45" fill="none" stroke="#00D9FF" stroke-width="2.5" opacity="0.5"/>
  <circle cx="256" cy="280" r="70" fill="none" stroke="#00D9FF" stroke-width="2" opacity="0.3"/>
  
  <!-- Central Sentinel Eye -->
  <circle cx="256" cy="280" r="15" fill="#00D9FF" filter="url(#glow)"/>
  <circle cx="256" cy="280" r="8" fill="#001F3F"/>
  <circle cx="259" cy="277" r="3" fill="#00D9FF"/>
  
  <!-- Scan Lines (Crosshair pattern - 4 directions) -->
  <line x1="140" y1="280" x2="210" y2="280" stroke="#00D9FF" stroke-width="3" opacity="0.8" stroke-linecap="round"/>
  <line x1="302" y1="280" x2="372" y2="280" stroke="#00D9FF" stroke-width="3" opacity="0.8" stroke-linecap="round"/>
  <line x1="256" y1="140" x2="256" y2="210" stroke="#00D9FF" stroke-width="3" opacity="0.6" stroke-linecap="round"/>
  <line x1="256" y1="350" x2="256" y2="420" stroke="#00D9FF" stroke-width="3" opacity="0.6" stroke-linecap="round"/>
  
  <!-- Diagonal Accent Lines -->
  <line x1="180" y1="180" x2="220" y2="220" stroke="#00D9FF" stroke-width="2" opacity="0.5" stroke-linecap="round"/>
  <line x1="292" y1="180" x2="332" y2="220" stroke="#00D9FF" stroke-width="2" opacity="0.5" stroke-linecap="round"/>
  <line x1="180" y1="380" x2="220" y2="340" stroke="#00D9FF" stroke-width="2" opacity="0.4" stroke-linecap="round"/>
  <line x1="292" y1="380" x2="332" y2="340" stroke="#00D9FF" stroke-width="2" opacity="0.4" stroke-linecap="round"/>
  
  <!-- Shield corner accent marks -->
  <polygon points="140,170 150,155 165,165" fill="#00D9FF" opacity="0.6" filter="url(#glow)"/>
  <polygon points="372,170 362,155 347,165" fill="#00D9FF" opacity="0.6" filter="url(#glow)"/>
  
  <!-- Top accent -->
  <polygon points="256,90 270,100 242,100" fill="#00D9FF" opacity="0.7" filter="url(#glow)"/>
</svg>
